<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Clio Extractor</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://app.clio.com"
    />

    <link href="./assets/main.css" type="text/css" rel="stylesheet" />
  </head>

  <body>
    <!-- Login view (shown when not authenticated) -->
    <div id="login-view">
      <div class="login-card">
        <img alt="Clio Extractor" class="logo" src="./assets/clio-extractor-logo.png" />
        <div class="creator">Clio Data Extractor</div>

        <div id="auth-section">
          <div id="login-container" style="display: none">
            <p class="tip">Please login to your Clio account to continue</p>
            <label class="checkbox-label">
              <input type="checkbox" id="keepLoggedIn" />
              Keep me logged in
            </label>
            <div class="actions">
              <button id="loginBtn" class="button">Login with Clio</button>
            </div>
          </div>

          <div id="loading-container">
            <p class="tip">Checking authentication status...</p>
          </div>
        </div>

        <div id="status-message"></div>
      </div>
    </div>

    <!-- Main app view (shown when authenticated) -->
    <div id="app-view" style="display: none">
      <aside id="sidebar">
        <div class="sidebar-header">
          <button type="button" id="sidebar-home" class="sidebar-header-btn" title="Home" aria-label="Go to home">
            <img alt="Clio Extractor" class="sidebar-logo" src="./assets/clio-extractor-logo.png" />
            <h2 class="sidebar-title">Clio Extractor</h2>
          </button>
        </div>

        <nav class="sidebar-nav">
          <button class="nav-item" data-page="schema">Schema</button>
          <button class="nav-item" data-page="revenue-report">Revenue Report</button>
          <button class="nav-item" data-page="firm-revenue">Firm Revenue</button>
          <button class="nav-item" data-page="unpaid-bills">Unpaid Bills</button>
        </nav>

        <div class="sidebar-footer">
          <div class="sidebar-version-row">
            <span id="sidebar-version" class="sidebar-version" title="Current version"></span>
            <button id="sidebar-check-updates" class="sidebar-update-btn" type="button" title="Check for updates" aria-label="Check for updates">
              <svg class="sidebar-update-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
              </svg>
            </button>
          </div>
          <div id="current-user" class="current-user-row">
            <div class="current-user">
              <span class="user-label">Signed in as</span>
              <span id="user-name" class="user-name">Loading...</span>
            </div>
            <div class="user-menu-wrapper">
              <button id="sidebar-user-menu-btn" class="user-menu-btn" type="button" title="Account menu" aria-label="Account menu" aria-expanded="false" aria-haspopup="true">
                <svg class="user-menu-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
              </button>
              <div id="sidebar-user-menu" class="user-menu-dropdown" role="menu" hidden>
                <button type="button" class="user-menu-item" role="menuitem" data-action="logout">Logout</button>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <main id="content-area">
        <div id="page-content">
          <!-- Page content loaded dynamically -->
        </div>
      </main>
    </div>

    <script type="module" src="./src/renderer.ts"></script>
  </body>
</html>
